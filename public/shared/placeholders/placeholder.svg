<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Imagen no disponible">
  <!-- PLACEHOLDER genérico — usar para cualquier imagen aún no disponible -->
  <!-- Copia este archivo o referencia su ruta en los datos de prueba -->
  <!-- Ruta: /shared/placeholders/placeholder.svg -->

  <!-- Fondo gris neutro -->
  <rect width="800" height="600" fill="#E5E7EB"/>

  <!-- Marco interior -->
  <rect x="20" y="20" width="760" height="560" rx="4" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="8 4"/>

  <!-- Ícono de imagen (landscape) -->
  <g transform="translate(400, 270)" fill="#9CA3AF">
    <!-- Rectángulo de imagen -->
    <rect x="-60" y="-48" width="120" height="96" rx="8" fill="none" stroke="#9CA3AF" stroke-width="3"/>
    <!-- Montaña -->
    <polygon points="-40,24 0,-20 40,24" fill="#9CA3AF" opacity="0.5"/>
    <!-- Sol -->
    <circle cx="28" cy="-16" r="12" fill="#9CA3AF" opacity="0.5"/>
  </g>

  <!-- Etiqueta -->
  <text
    x="400" y="355"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="16"
    fill="#6B7280"
    letter-spacing="1"
  >Imagen pendiente</text>

  <!-- Dimensión -->
  <text
    x="400" y="385"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="12"
    fill="#9CA3AF"
  >800 × 600 px</text>
</svg>
